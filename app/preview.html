<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vista Previa — MASORANGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<link rel="stylesheet" href="styles.css">
<style>
body { background: #26241F; }
.preview-container { display: flex; flex-direction: column; height: 100vh; }
.preview-header {
  background: #000;
  color: #fff;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #3C3934;
}
.preview-header a { color: #FF7900; text-decoration: none; font-weight: 600; }
.preview-header a:hover { text-decoration: underline; }
.preview-title { font-size: 16px; font-weight: 700; }
.preview-subtitle { font-size: 12px; color: #B8B2A9; }
.preview-controls {
  background: #1a1815;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-bottom: 1px solid #3C3934;
}
.preview-counter { color: #8A857C; font-size: 13px; font-weight: 600; }
.preview-buttons { display: flex; gap: 8px; }
.preview-button {
  padding: 8px 16px;
  background: #FF7900;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: background 0.2s;
}
.preview-button:hover { background: #E56D00; }
.preview-button:disabled { background: #5C5852; cursor: not-allowed; }
.preview-stage {
  flex: 1;
  overflow: auto;
  padding: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.preview-deck {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
  transform-origin: top center;
  width: 1280px;
}
.slide-wrapper {
  width: 100%;
  display: none;
}
.slide-wrapper.active {
  display: block;
}
.mo-slide {
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.keyboard-hint {
  position: fixed;
  bottom: 15px;
  right: 15px;
  font-size: 11px;
  color: #8A857C;
  background: rgba(0,0,0,0.5);
  padding: 10px 15px;
  border-radius: 6px;
}
</style>
</head>
<body>

<div class="preview-container">

  <!-- Header -->
  <div class="preview-header">
    <div>
      <div class="preview-title" id="previewTitle">Cargando...</div>
      <div class="preview-subtitle" id="previewSubtitle"></div>
    </div>
    <a href="home.html">← Volver a Inicio</a>
  </div>

  <!-- Controls -->
  <div class="preview-controls">
    <span class="preview-counter"><span id="slideNum">0</span> / <span id="slideTotal">0</span></span>
    <div class="preview-buttons">
      <button class="preview-button" id="btnPrev" onclick="PreviewApp.prevSlide()">← Anterior</button>
      <button class="preview-button" id="btnNext" onclick="PreviewApp.nextSlide()">Siguiente →</button>
    </div>
  </div>

  <!-- Slides -->
  <div class="preview-stage">
    <div id="previewDeck" class="preview-deck"></div>
  </div>

  <div class="keyboard-hint">
    ← → o Espacio para navegar | ESC para salir
  </div>

</div>

<script src="api-client.js"></script>
<script>
const PreviewApp = {
  currentSlide: 0,
  totalSlides: 0,
  report: null,

  async init() {
    const params = new URLSearchParams(window.location.search);
    const reportId = params.get('report');

    if (!reportId) {
      alert('No se especificó un informe');
      window.location.href = 'home.html';
      return;
    }

    try {
      console.log('Cargando informe para vista previa:', reportId);
      this.report = await ApiClient.getReport(reportId);

      // Update header
      document.getElementById('previewTitle').textContent = reportId;
      document.getElementById('previewSubtitle').textContent =
        `${this.report.dept} • Semana ${this.report.week} • ${this.report.range}`;

      // Generate slides from report data
      this.generateSlides();

      this.updateCounter();
      this.updateButtonState();

      // Setup keyboard navigation
      document.addEventListener('keydown', (e) => this.handleKeyboard(e));
    } catch (error) {
      alert('Error al cargar el informe: ' + error.message);
      window.location.href = 'home.html';
    }
  },

  generateSlides() {
    const deckEl = document.getElementById('previewDeck');
    const slides = [];

    // Portada
    slides.push(this.createCoverSlide());

    // Resumen Ejecutivo
    slides.push(this.createSummarySlide());

    // Slides de incidencias
    if (this.report.incidents) {
      this.report.incidents.forEach(incident => {
        slides.push(this.createIncidentSlide(incident));
      });
    }

    this.totalSlides = slides.length;
    deckEl.innerHTML = '';
    slides.forEach((slideHTML, idx) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'slide-wrapper' + (idx === 0 ? ' active' : '');
      wrapper.innerHTML = slideHTML;
      deckEl.appendChild(wrapper);
    });
  },

  createCoverSlide() {
    return `
      <div class="mo-slide" style="background: #000; color: #fff; padding: 60px 40px; display: flex; flex-direction: column; justify-content: center; height: 720px; box-sizing: border-box;">
        <div style="font-size: 48px; font-weight: 700; margin-bottom: 20px;">Reporte de incidencias IT + RED</div>
        <div style="font-size: 24px; color: #B8B2A9; margin-bottom: 40px;">${this.report.range}</div>
        <div style="font-size: 16px; color: #8A857C;">${this.report.dept}</div>
        <div style="margin-top: auto; display: flex; gap: 15px; align-items: center;">
          <div style="font-size: 14px; color: #FF7900;">Semana ${this.report.week}, ${this.report.year}</div>
        </div>
      </div>
    `;
  },

  createSummarySlide() {
    const incidents = this.report.incidents || [];
    const totalDur = incidents.reduce((sum, i) => sum + this.parseDuration(i.duration), 0);
    const totalMobile = incidents.reduce((sum, i) => sum + (parseFloat(i.cMobile) || 0), 0);
    const totalFTTH = incidents.reduce((sum, i) => sum + (parseFloat(i.cFTTH) || 0), 0);
    const sl1 = incidents.filter(i => i.severity === 'SL1').length;
    const sl2 = incidents.filter(i => i.severity === 'SL2').length;
    const sl3 = incidents.filter(i => i.severity === 'SL3').length;
    const ministry = incidents.filter(i => i.ministry).length;

    return `
      <div class="mo-slide" style="padding: 40px; display: flex; flex-direction: column; justify-content: center;">
        <h1 style="font-size: 36px; margin-bottom: 30px;">La semana en cifras</h1>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px;">
          <div style="padding: 20px; background: #F7F6F4; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: 700; color: #FF7900;">${incidents.length}</div>
            <div style="font-size: 12px; color: #8A857C; margin-top: 5px;">Incidencias</div>
          </div>
          <div style="padding: 20px; background: #F7F6F4; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: 700;">${this.formatDuration(totalDur)}</div>
            <div style="font-size: 12px; color: #8A857C; margin-top: 5px;">Tiempo acumulado</div>
          </div>
          <div style="padding: 20px; background: #F7F6F4; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: 700;">${totalMobile.toFixed(1)}K</div>
            <div style="font-size: 12px; color: #8A857C; margin-top: 5px;">Clientes móvil</div>
          </div>
          <div style="padding: 20px; background: #F7F6F4; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: 700;">${totalFTTH.toFixed(1)}K</div>
            <div style="font-size: 12px; color: #8A857C; margin-top: 5px;">Clientes FTTH</div>
          </div>
        </div>
        <div style="margin-top: 30px; padding: 20px; background: #000; color: #fff; border-radius: 8px; text-align: center;">
          <div style="font-size: 14px; margin-bottom: 10px;">Reportadas al Ministerio: <strong>${ministry}</strong></div>
          <div style="font-size: 14px;">Severidad: SL1: ${sl1} | SL2: ${sl2} | SL3: ${sl3}</div>
        </div>
      </div>
    `;
  },

  createIncidentSlide(incident) {
    const severityColors = { 'SL1': '#D43A2F', 'SL2': '#FF7900', 'SL3': '#E6A100' };
    const color = severityColors[incident.severity] || '#FF7900';

    return `
      <div class="mo-slide" style="padding: 40px; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 30px;">
          <div>
            <div style="font-size: 12px; color: #8A857C; text-transform: uppercase;">${incident.group}</div>
            <h1 style="font-size: 28px; margin: 10px 0;">${incident.title}</h1>
            <div style="font-size: 13px; color: #5C5852;">${incident.category} · ${incident.system}</div>
          </div>
          <div style="padding: 8px 16px; background: ${color}; color: #fff; border-radius: 6px; font-size: 12px; font-weight: 600;">
            ${incident.severity}
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
          <div>
            <div style="font-size: 11px; color: #8A857C; text-transform: uppercase; margin-bottom: 5px;">ID</div>
            <div style="font-size: 13px;">${incident.ticket}</div>
          </div>
          <div>
            <div style="font-size: 11px; color: #8A857C; text-transform: uppercase; margin-bottom: 5px;">Fecha</div>
            <div style="font-size: 13px;">${incident.date}</div>
          </div>
          <div>
            <div style="font-size: 11px; color: #8A857C; text-transform: uppercase; margin-bottom: 5px;">Duración</div>
            <div style="font-size: 13px;">${incident.duration}</div>
          </div>
          <div>
            <div style="font-size: 11px; color: #8A857C; text-transform: uppercase; margin-bottom: 5px;">Marcas</div>
            <div style="font-size: 13px;">${incident.brands || '—'}</div>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
          <div>
            <div style="font-size: 11px; color: #8A857C; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Causa</div>
            <div style="font-size: 12px; line-height: 1.5;">${incident.cause || '—'}</div>
          </div>
          <div>
            <div style="font-size: 11px; color: #8A857C; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Solución</div>
            <div style="font-size: 12px; line-height: 1.5;">${incident.solution || '—'}</div>
          </div>
        </div>
      </div>
    `;
  },

  parseDuration(dur) {
    const h = (dur.match(/(\d+)\s*h/) || [0, 0])[1];
    const m = (dur.match(/(\d+)\s*m/) || [0, 0])[1];
    return parseInt(h) * 60 + parseInt(m);
  },

  formatDuration(minutes) {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    if (h && m) return h + 'h ' + m + 'min';
    if (h) return h + 'h';
    return m + 'min';
  },

  updateCounter() {
    document.getElementById('slideNum').textContent = this.currentSlide + 1;
    document.getElementById('slideTotal').textContent = this.totalSlides;
  },

  updateButtonState() {
    document.getElementById('btnPrev').disabled = this.currentSlide === 0;
    document.getElementById('btnNext').disabled = this.currentSlide === this.totalSlides - 1;
  },

  nextSlide() {
    if (this.currentSlide < this.totalSlides - 1) {
      this.goToSlide(this.currentSlide + 1);
    }
  },

  prevSlide() {
    if (this.currentSlide > 0) {
      this.goToSlide(this.currentSlide - 1);
    }
  },

  goToSlide(idx) {
    document.querySelectorAll('.slide-wrapper').forEach(el => {
      el.classList.remove('active');
    });
    document.querySelectorAll('.slide-wrapper')[idx].classList.add('active');
    this.currentSlide = idx;
    this.updateCounter();
    this.updateButtonState();

    // Scroll to slide
    document.querySelectorAll('.slide-wrapper')[idx].scrollIntoView({ behavior: 'smooth' });
  },

  handleKeyboard(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      this.nextSlide();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      this.prevSlide();
    } else if (e.key === 'Escape') {
      window.location.href = 'home.html';
    }
  },
};

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => PreviewApp.init(), 300);
});
</script>

</body>
</html>
